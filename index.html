<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJ_xHLBJCSUZfO2a8Zue_Vf-0Zz2XMbiw",
  authDomain: "gym-tracker-5df93.firebaseapp.com",
  databaseURL: "https://gym-tracker-5df93-default-rtdb.firebaseio.com",
  projectId: "gym-tracker-5df93",
  storageBucket: "gym-tracker-5df93.firebasestorage.app",
  messagingSenderId: "21290903440",
  appId: "1:21290903440:web:da88dbb4028901c8f03515"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const database = getDatabase(app);
const provider = new GoogleAuthProvider();

window.firebaseAuth = auth;
window.firebaseDb = database;
window.firebaseRef = ref;
window.firebaseSet = set;
window.firebaseGet = get;
window.firebaseChild = child;
window.firebaseSignOut = signOut;
window.googleSignIn = () => signInWithPopup(auth, provider);
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080c14;--sf:#0f1623;--card:#131c2e;--bd:#1a2640;--acc:#e8ff47;--blue:#4f9cf9;--pur:#9b6dff;--red:#ff4d6d;--grn:#2de08e;--org:#ff8c42;--tel:#2dd4bf;--pnk:#f472b6;--mut:#4a5878;--txt:#c8d8f0;--brt:#f0f6ff}
body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;min-height:100vh;font-size:14px}
.hdr{background:linear-gradient(180deg,var(--sf) 0%,var(--bg) 100%);border-bottom:1px solid var(--bd);padding:20px 24px 0;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:4px}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:22px;color:var(--brt);letter-spacing:-.03em;display:flex;align-items:center;gap:10px}
.hdr-pills{display:flex;gap:10px;flex-wrap:wrap}
.pill{border-radius:10px;padding:8px 14px;text-align:center;border:1px solid}
.pill-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.pill-v{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:18px}
.user-info{display:flex;align-items:center;gap:8px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:6px 12px}
.user-name{font-size:11px;font-weight:600;color:var(--brt)}
.logout-btn{background:none;border:none;color:var(--mut);cursor:pointer;font-size:12px;font-weight:600}
.logout-btn:hover{color:var(--red)}
.tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tb{border:none;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;white-space:nowrap;padding:9px 14px;background:transparent;color:var(--mut);border-radius:8px 8px 0 0;border-bottom:2px solid transparent;transition:all .18s;letter-spacing:.02em}
.tb.on{background:var(--acc);color:#000;border-bottom:2px solid var(--acc)}
.body{padding:24px;max-width:1300px;margin:0 auto;display:flex;flex-direction:column;gap:20px;padding-bottom:100px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:20px}
.btn{border:none;border-radius:8px;padding:10px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.ba{background:var(--acc);color:#080c14}
.empty-state{text-align:center;padding:48px 0}
.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);gap:24px}
.auth-card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:40px;text-align:center;max-width:400px}
.auth-icon{font-size:48px;margin-bottom:16px}
.auth-title{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:800;color:var(--brt);margin-bottom:8px}
.auth-desc{font-size:14px;color:var(--mut);margin-bottom:24px}
#google-signin{margin:0 auto}
.spinner{width:40px;height:40px;border:3px solid var(--bd);border-top:3px solid var(--acc);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.kpi{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:18px 20px 18px 0;position:relative;overflow:hidden}
.kpi-b{position:absolute;top:0;left:0;width:3px;height:100%}
.kpi-i{padding-left:20px}
.kpi-l{color:var(--mut);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.kpi-v{font-family:'Space Grotesk',sans-serif;color:var(--brt);font-size:26px;font-weight:800;margin-top:6px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px}
.st{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.st-b{width:3px;height:18px;background:var(--acc);border-radius:2px;flex-shrink:0}
.st-l{color:var(--mut);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.tagm{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:.05em;text-transform:uppercase;border:1px solid}
.tagt{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;letter-spacing:.04em;text-transform:uppercase;background:#1a264080;border:1px solid #2a3650;color:#6a7d9a}
.fg{display:flex;flex-direction:column;gap:6px}
.fl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.fi,.fta{background:var(--sf);border:1px solid var(--bd);border-radius:8px;color:var(--brt);font-family:'Inter',sans-serif;font-size:13px;padding:9px 12px;width:100%;outline:none;transition:border-color .2s}
.fi:focus,.fta:focus{border-color:var(--acc)}
.fta{resize:vertical;min-height:70px}
.bo{background:none;border:1px solid var(--bd);color:var(--txt)}
.tip{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:9px 12px;font-size:11px;color:var(--mut);display:flex;gap:8px;align-items:flex-start;margin-bottom:12px}
#crono-fab{position:fixed;bottom:24px;right:24px;z-index:89999;width:62px;height:62px;border-radius:50%;background:var(--card);border:2px solid var(--acc);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px #00000070;transition:border-color .3s;user-select:none}
#crono-fab:hover{transform:scale(1.06)}
#crono-fab.sw-running{border-color:var(--grn);animation:pg 1.5s ease-in-out infinite}
#crono-fab.cd-running{border-color:var(--red);animation:pr 1s ease-in-out infinite}
#crono-fab.cd-done{animation:pf2 .5s ease-in-out infinite}
@keyframes pg{0%,100%{box-shadow:0 4px 20px #00000070,0 0 0 0 #2de08e50}50%{box-shadow:0 4px 20px #00000070,0 0 0 8px #2de08e00}}
@keyframes pr{0%,100%{box-shadow:0 4px 20px #00000070,0 0 0 0 #ff4d6d60}50%{box-shadow:0 4px 20px #00000070,0 0 0 8px #ff4d6d00}}
@keyframes pf2{0%,100%{border-color:var(--acc)}50%{border-color:var(--grn)}}
#cfab-icon{font-size:17px;line-height:1;margin-bottom:1px}
#cfab-time{font-family:'Space Grotesk',monospace;font-size:11px;font-weight:800;color:var(--acc);line-height:1}
#crono-panel{position:fixed;bottom:98px;right:24px;z-index:89998;width:282px;background:var(--card);border:1px solid var(--bd);border-radius:18px;padding:18px;box-shadow:0 8px 32px #00000090;display:none}
#crono-panel.open{display:block;animation:su .2s ease-out}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ct-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.ct-close{background:none;border:none;color:var(--mut);cursor:pointer;font-size:16px;padding:0}
.ct-close:hover{color:var(--txt)}
.ct-tabs{display:flex;gap:3px;background:var(--sf);border-radius:8px;padding:3px;margin-bottom:14px}
.ct-tab{flex:1;border:none;background:transparent;color:var(--mut);font-size:11px;font-weight:600;font-family:'Inter',sans-serif;padding:5px 0;border-radius:6px;cursor:pointer;transition:all .15s}
.ct-tab.on{background:var(--card);color:var(--brt)}
.ct-disp{font-family:'Space Grotesk',monospace;font-size:54px;font-weight:800;color:var(--brt);text-align:center;letter-spacing:-.02em;line-height:1;margin:6px 0 14px;transition:color .2s}
.ct-disp.grn{color:var(--grn)}
.ct-disp.red{color:var(--red)}
.ct-disp.done{color:var(--acc)}
.ct-prog{height:4px;background:var(--bd);border-radius:2px;margin-bottom:14px;overflow:hidden;display:none}
.ct-pfill{height:100%;border-radius:2px;background:var(--grn);transition:width .25s linear,background .2s}
.ct-done{text-align:center;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:var(--acc);padding:2px 0 8px;display:none}
.ct-done.show{display:block}
.ct-btns{display:flex;gap:7px;margin-bottom:12px}
.ct-bmain{flex:1;border:none;border-radius:9px;padding:10px 0;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.ct-bmain:active{transform:scale(.97)}
.ct-start{background:var(--grn);color:#080c14}
.ct-pause{background:var(--org);color:#080c14}
.ct-stop{background:var(--sf);border:1px solid var(--bd);color:var(--txt)}
.ct-presets{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.ct-preset{border:1px solid var(--bd);background:var(--sf);color:var(--txt);border-radius:7px;padding:6px 0;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:all .12s}
.ct-preset:hover{border-color:var(--acc);color:var(--acc)}
.ct-preset.on{border-color:var(--acc);background:var(--acc)18;color:var(--acc)}
.ct-custom{display:flex;gap:5px;margin-top:8px;align-items:center}
.ct-custom input{background:var(--sf);border:1px solid var(--bd);border-radius:7px;color:var(--brt);font-family:'Space Grotesk',monospace;font-size:14px;font-weight:700;padding:6px 8px;width:52px;text-align:center;outline:none}
.ct-custom input:focus{border-color:var(--acc)}
.ct-custom label{font-size:10px;color:var(--mut);font-weight:600}
.ct-cbtn{background:var(--acc);border:none;border-radius:7px;color:#080c14;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:6px 10px;cursor:pointer;white-space:nowrap}
@media(max-width:640px){.body{padding:12px;gap:14px;padding-bottom:88px}.logo{font-size:18px}.user-info{flex-direction:column;align-items:flex-start}.tb{font-size:11px;padding:8px 11px}.g4{grid-template-columns:repeat(2,1fr)}}
</style>

<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="auth-screen" style="display:flex">
  <div class="auth-card">
    <div class="auth-icon">💪</div>
    <div class="auth-title">GYM TRACKER</div>
    <div class="auth-desc">Registrá tus entrenamientos y seguí tu progreso.</div>
    <div id="google-signin"></div>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div id="app-container" style="display:none">
  <div class="hdr">
    <div class="hdr-top">
      <div class="logo">💪 GYM TRACKER</div>
      <div class="user-info" id="user-card">
        <div class="user-name" id="user-name">Usuario</div>
        <button class="logout-btn" onclick="logout()">Salir</button>
      </div>
    </div>
    <div class="tabs" id="tabs-bar"></div>
  </div>
  <div class="body" id="body"></div>
</div>

<!-- CRONÓMETRO FLOTANTE -->
<div id="crono-fab" onclick="toggleCrono()" style="display:none"><div id="cfab-icon">⏱</div><div id="cfab-time">00:00</div></div>
<div id="crono-panel">
  <div class="ct-title"><span>⏱ Descanso</span><button class="ct-close" onclick="toggleCrono()">✕</button></div>
  <div class="ct-tabs"><button class="ct-tab on" id="ct-sw" onclick="switchTab('sw')">Cronómetro</button><button class="ct-tab" id="ct-cd" onclick="switchTab('cd')">Temporizador</button></div>
  <div class="ct-disp grn" id="ct-disp">00:00</div>
  <div class="ct-prog" id="ct-prog"><div class="ct-pfill" id="ct-pfill" style="width:100%"></div></div>
  <div class="ct-done" id="ct-done">✓ ¡Descanso completado!</div>
  <div class="ct-btns"><button class="ct-bmain ct-start" id="ct-main" onclick="cronoMain()">Iniciar</button><button class="ct-bmain ct-stop" onclick="cronoReset()">Reiniciar</button></div>
  <div id="ct-cd-ui" style="display:none">
    <div style="font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:7px">Tiempo de descanso</div>
    <div class="ct-presets">
      <button class="ct-preset" onclick="setP(45,this)">45s</button><button class="ct-preset on" onclick="setP(60,this)">1 min</button>
      <button class="ct-preset" onclick="setP(90,this)">1:30</button><button class="ct-preset" onclick="setP(120,this)">2 min</button>
      <button class="ct-preset" onclick="setP(150,this)">2:30</button><button class="ct-preset" onclick="setP(180,this)">3 min</button>
      <button class="ct-preset" onclick="setP(240,this)">4 min</button><button class="ct-preset" onclick="setP(300,this)">5 min</button>
    </div>
    <div class="ct-custom">
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px"><input type="number" id="cm" min="0" max="59" value="1"><label>min</label></div>
      <span style="color:var(--mut);font-weight:700;font-size:16px;padding-bottom:14px">:</span>
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px"><input type="number" id="cs" min="0" max="59" value="30"><label>seg</label></div>
      <button class="ct-cbtn" onclick="setCustom()">Usar →</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// GOOGLE SIGN-IN & FIREBASE AUTH
// ════════════════════════════════════════

let currentUser = null;

function initGoogleSignIn() {
  google.accounts.id.initialize({
    client_id: '618515494362-3mu8g7v494spc37s9vdum892l66jjsfd.apps.googleusercontent.com',
    callback: handleSignIn
  });
  google.accounts.id.renderButton(document.getElementById('google-signin'), { theme: 'dark', size: 'large' });
}

function handleSignIn() {
  window.googleSignIn().then(result => {
    currentUser = { email: result.user.email, name: result.user.displayName };
    document.getElementById('user-name').textContent = currentUser.name || currentUser.email;
    loadFromFirebase();
    showApp();
  }).catch(error => {
    console.error('Error:', error);
    alert('Error al loguearse');
  });
}

function logout() {
  window.firebaseSignOut(window.firebaseAuth).then(() => {
    currentUser = null;
    document.getElementById('app-container').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('crono-fab').style.display = 'none';
    initGoogleSignIn();
  });
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-container').style.display = 'block';
  document.getElementById('crono-fab').style.display = 'flex';
  renderTabs();
  renderBody();
}

// ════════════════════════════════════════
// FIREBASE SYNC
// ════════════════════════════════════════

async function saveToFirebase() {
  if (!currentUser) return;
  try {
    const data = { rutinas, rutinaActivaId, sesiones, bodyData, objPeso, lastSaved: new Date().toISOString() };
    await window.firebaseSet(window.firebaseRef(window.firebaseDb, `users/${currentUser.email}`), data);
  } catch (e) {
    console.error('Firebase save error:', e);
  }
}

async function loadFromFirebase() {
  if (!currentUser) return;
  try {
    const snapshot = await window.firebaseGet(window.firebaseChild(window.firebaseRef(window.firebaseDb), `users/${currentUser.email}`));
    if (snapshot.exists()) {
      const data = snapshot.val();
      rutinas = data.rutinas || [];
      rutinaActivaId = data.rutinaActivaId || null;
      sesiones = data.sesiones || [];
      bodyData = data.bodyData || [];
      objPeso = data.objPeso || 75;
    }
  } catch (e) {
    console.error('Firebase load error:', e);
  }
}

// ════════════════════════════════════════
// CRONÓMETRO (FIXES APLICADOS)
// ════════════════════════════════════════

let cronoTab = 'sw';
let swRunning = false, swStart = 0, swAccum = 0;
let cdTotal = 60, cdRemaining = 60, cdRunning = false, cdStart = 0, cdBaseRemaining = 60, cdDone = false;
let cronoTick = null;

const cDisp = () => document.getElementById('ct-disp');
const cFabT = () => document.getElementById('cfab-time');
const cFabI = () => document.getElementById('cfab-icon');
const cFab = () => document.getElementById('crono-fab');
const cMain = () => document.getElementById('ct-main');
const cPfill = () => document.getElementById('ct-pfill');
const cProg = () => document.getElementById('ct-prog');
const cDone = () => document.getElementById('ct-done');

function fmtT(s) {
  const m = Math.floor(Math.abs(s) / 60);
  const sec = Math.floor(Math.abs(s) % 60);
  return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

function startTick() {
  if (cronoTick) clearInterval(cronoTick);
  cronoTick = setInterval(() => {
    if (cronoTab === 'sw' && swRunning) {
      const elapsed = swAccum + (Date.now() - swStart);
      const s = Math.floor(elapsed / 1000);
      const str = fmtT(s);
      cDisp().textContent = str;
      cFabT().textContent = str;
      cDisp().className = 'ct-disp grn';
      cFab().className = 'sw-running';
      cFabI().textContent = '⏱';
    } else if (cronoTab === 'cd' && cdRunning) {
      const elapsed = Math.floor((Date.now() - cdStart) / 1000);
      const rem = Math.max(0, cdBaseRemaining - elapsed);
      cdRemaining = rem;
      const str = fmtT(rem);
      cDisp().textContent = str;
      cFabT().textContent = str;
      const pct = cdTotal > 0 ? (rem / cdTotal) * 100 : 100;
      if (cPfill()) {
        cPfill().style.width = pct + '%';
        cPfill().style.background = rem <= 10 && rem > 0 ? 'var(--red)' : 'var(--grn)';
      }
      if (rem <= 10 && rem > 0) {
        cDisp().className = 'ct-disp red';
        cFab().className = 'cd-running';
        cFabI().textContent = '⚡';
      } else {
        cDisp().className = 'ct-disp grn';
        cFab().className = 'cd-running';
        cFabI().textContent = '⏱';
      }
      if (rem === 0) {
        cdRunning = false;
        cdDone = true;
        clearInterval(cronoTick);
        cronoTick = null;
        cDisp().textContent = '00:00';
        cDisp().className = 'ct-disp done';
        cFab().className = 'cd-done';
        cFabT().textContent = '00:00';
        cFabI().textContent = '✅';
        if (cDone()) cDone().classList.add('show');
        cMain().textContent = 'Reiniciar';
        cMain().className = 'ct-bmain ct-stop';
        cronoBeep();
      }
    }
  }, 100);
}

function stopTick() {
  if (cronoTick) {
    clearInterval(cronoTick);
    cronoTick = null;
  }
}

function toggleCrono() {
  const p = document.getElementById('crono-panel');
  const open = p.classList.contains('open');
  if (open) {
    p.classList.remove('open');
    setTimeout(() => {
      if (!p.classList.contains('open')) p.style.display = 'none';
    }, 180);
  } else {
    p.style.display = 'block';
    requestAnimationFrame(() => p.classList.add('open'));
  }
}

function switchTab(t) {
  cronoTab = t;
  document.getElementById('ct-sw').classList.toggle('on', t === 'sw');
  document.getElementById('ct-cd').classList.toggle('on', t === 'cd');
  document.getElementById('ct-cd-ui').style.display = t === 'cd' ? 'block' : 'none';
  if (cProg()) cProg().style.display = t === 'cd' ? 'block' : 'none';
  cronoReset();
}

function cronoMain() {
  if (cronoTab === 'sw') {
    if (swRunning) {
      swAccum += Date.now() - swStart;
      swRunning = false;
      stopTick();
      cMain().textContent = 'Continuar';
      cMain().className = 'ct-bmain ct-start';
      cDisp().className = 'ct-disp';
      cFab().className = '';
      const s = Math.floor(swAccum / 1000);
      cDisp().textContent = fmtT(s);
      cFabT().textContent = fmtT(s);
    } else {
      swStart = Date.now();
      swRunning = true;
      startTick();
      cMain().textContent = 'Pausar';
      cMain().className = 'ct-bmain ct-pause';
    }
  } else {
    if (cdDone) {
      cronoReset();
      return;
    }
    if (cdRunning) {
      const elapsed = Math.floor((Date.now() - cdStart) / 1000);
      cdRemaining = Math.max(0, cdBaseRemaining - elapsed);
      cdRunning = false;
      stopTick();
      cMain().textContent = 'Continuar';
      cMain().className = 'ct-bmain ct-start';
      cDisp().className = 'ct-disp';
      cFab().className = '';
      cDisp().textContent = fmtT(cdRemaining);
      cFabT().textContent = fmtT(cdRemaining);
    } else {
      if (cdRemaining <= 0) {
        cronoReset();
        return;
      }
      cdStart = Date.now();
      cdBaseRemaining = cdRemaining;
      cdRunning = true;
      cdDone = false;
      if (cDone()) cDone().classList.remove('show');
      cMain().textContent = 'Pausar';
      cMain().className = 'ct-bmain ct-pause';
      startTick();
    }
  }
}

function cronoReset() {
  stopTick();
  swRunning = false;
  swAccum = 0;
  swStart = 0;
  cdRunning = false;
  cdDone = false;
  cdRemaining = cdTotal;
  cdBaseRemaining = cdTotal;
  if (cDone()) cDone().classList.remove('show');
  cMain().textContent = 'Iniciar';
  cMain().className = 'ct-bmain ct-start';
  cFab().className = '';
  cFabI().textContent = '⏱';
  const str = fmtT(cronoTab === 'sw' ? 0 : cdTotal);
  cDisp().textContent = str;
  cFabT().textContent = str;
  cDisp().className = 'ct-disp';
  if (cPfill()) cPfill().style.width = '100%';
}

function setP(s, btn) {
  cronoReset();
  cdTotal = s;
  cdRemaining = s;
  cdBaseRemaining = s;
  document.querySelectorAll('.ct-preset').forEach(b => b.classList.remove('on'));
  if (btn) btn.classList.add('on');
  cDisp().textContent = fmtT(s);
  cFabT().textContent = fmtT(s);
}

function setCustom() {
  const m = parseInt(document.getElementById('cm').value) || 0;
  const s = parseInt(document.getElementById('cs').value) || 0;
  const tot = m * 60 + s;
  if (tot <= 0) return;
  document.querySelectorAll('.ct-preset').forEach(b => b.classList.remove('on'));
  cronoReset();
  cdTotal = tot;
  cdRemaining = tot;
  cdBaseRemaining = tot;
  cDisp().textContent = fmtT(tot);
  cFabT().textContent = fmtT(tot);
}

function cronoBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const b = (f, t, d) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g);
      g.connect(ctx.destination);
      o.frequency.value = f;
      g.gain.setValueAtTime(0, ctx.currentTime + t);
      g.gain.linearRampToValueAtTime(.3, ctx.currentTime + t + .01);
      g.gain.linearRampToValueAtTime(0, ctx.currentTime + t + d);
      o.start(ctx.currentTime + t);
      o.stop(ctx.currentTime + t + d + .05);
    };
    b(880, 0, .15);
    b(1100, .2, .15);
    b(880, .4, .2);
  } catch (e) {}
}

  Tríceps: C.pur, Glúteos: C.tel, Abdomen: C.pnk, 'Full Body': C.mut, Cardio: C.blue

const TABS = ['Dashboard', 'Registrar', 'Historial', 'Récords', 'Rutina', 'Cuerpo'];
let rutinas = [], rutinaActivaId = null, sesiones = [], bodyData = [], objPeso = 75;
let aTab = 'Dashboard';

function renderTabs() {
  document.getElementById('tabs-bar').innerHTML = TABS.map(t => 
    `<button class="tb${t === aTab ? ' on' : ''}" onclick="gT('${t}')">${t}</button>`
  ).join('');
}

function gT(t) {
  aTab = t;
  renderTabs();
  renderBody();
}

function getRutinaActiva() {
  return rutinas.find(r => r.id === rutinaActivaId) || null;
}

function renderBody() {
  const b = document.getElementById('body');
  let html = '';

  if (aTab === 'Dashboard') {
    const ra = getRutinaActiva();
    if (!ra) {
      html = `<div class="card"><div class="empty-state"><div style="font-size:48px;margin-bottom:16px">💪</div><div style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:800;color:var(--brt);margin-bottom:8px">¡Bienvenido!</div><div style="font-size:14px;color:var(--mut);margin-bottom:24px">Creá tu primera rutina para empezar.</div><button class="btn ba" onclick="gT('Rutina')">Crear primera rutina →</button></div></div>`;
    } else {
      const totalSes = sesiones.length;
      const diasRut = Object.keys(ra.dias).length;
      html = `<div class="g4">${[
        {l: 'Rutina activa', v: ra.nombre.split('·')[0].trim(), c: C.pur},
        {l: 'Sesiones', v: totalSes, c: C.blue},
        {l: 'Días/semana', v: diasRut, c: C.grn},
        {l: 'Objetivo', v: ra.objetivo || '—', c: C.acc}
      ].map(kp => `<div class="kpi"><div class="kpi-b" style="background:${kp.c}"></div><div class="kpi-i"><div class="kpi-l">${kp.l}</div><div class="kpi-v">${kp.v}</div></div></div>`).join('')}</div>`;
    }
  } else if (aTab === 'Registrar') {
    const ra = getRutinaActiva();
    if (!ra) {
      html = `<div class="card"><div class="empty-state"><div style="font-size:48px;margin-bottom:16px">📝</div><div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:800;color:var(--brt);margin-bottom:8px">No hay rutina activa</div><button class="btn ba" style="margin-top:12px" onclick="gT('Rutina')">Crear rutina →</button></div></div>`;
    } else {
      html = `<div class="card"><div class="st"><div class="st-b"></div><span class="st-l">Nueva sesión</span></div><div style="margin-bottom:16px"><label class="fg"><span class="fl">Fecha</span><input type="date" id="r-fecha" class="fi"></label><button class="btn ba" onclick="guardarSesion()">Guardar sesión ✓</button></div></div>`;
    }
  } else if (aTab === 'Historial') {
    if (sesiones.length === 0) {
      html = `<div class="card"><div class="empty-state"><div style="font-size:48px;margin-bottom:16px">📋</div><div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:800;color:var(--brt);margin-bottom:8px">Sin sesiones</div><button class="btn ba" style="margin-top:12px" onclick="gT('Registrar')">Registrar →</button></div></div>`;
    } else {
      html = `<div class="card"><div class="st"><div class="st-b"></div><span class="st-l">Historial de sesiones</span></div><div style="display:flex;flex-direction:column;gap:10px">${sesiones.slice().reverse().map(s => `<div style="background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:14px"><div style="font-weight:700;color:var(--brt);margin-bottom:6px">${s.dia} · ${new Date(s.fecha).toLocaleDateString('es-AR')}</div></div>`).join('')}</div></div>`;
    }
  } else if (aTab === 'Récords') {
    html = `<div class="card"><div class="st"><div class="st-b"></div><span class="st-l">🏆 Récords personales</span></div><div style="text-align:center;color:var(--mut);padding:24px">Sin datos aún</div></div>`;
  } else if (aTab === 'Rutina') {
    const ra = getRutinaActiva();
    if (!ra) {
      html = `<div class="card"><div class="empty-state"><div style="font-size:48px;margin-bottom:16px">📋</div><div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:800;color:var(--brt);margin-bottom:8px">Creá tu primera rutina</div><button class="btn ba" style="margin-top:8px" onclick="newRutina()">+ Crear rutina</button></div></div>`;
    } else {
      html = `<div style="margin-bottom:20px"><div style="font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:800;color:var(--brt);margin-bottom:8px">${ra.nombre}</div><div style="font-size:12px;color:var(--mut)">${Object.keys(ra.dias).length} días/semana</div></div><button class="btn ba" style="margin-bottom:20px" onclick="newRutina()">+ Nueva rutina</button>`;
    }
  } else if (aTab === 'Cuerpo') {

  if (aTab === 'Registrar') {

}

function newRutina() {
  const n = prompt('Nombre de la rutina:', 'Mi rutina');
  if (n) {
    rutinas.push({
      id: Date.now(),
      nombre: n,
      objetivo: 'Hipertrofia',
      estado: 'activa',
      dias: {Lunes: {nombre: 'Pecho', color: C.blue, icon: '🏋️', ejercicios: []}}
    });
    rutinaActivaId = rutinas[rutinas.length - 1].id;
    saveToFirebase();
    gT('Rutina');
  }
}

function guardarSesion() {
  const f = document.getElementById('r-fecha')?.value;
  if (f) {
    sesiones.push({id: Date.now(), fecha: f, rutinaId: rutinaActivaId, ejercicios: []});
    saveToFirebase();
    alert('Sesión guardada');
    gT('Historial');
  }
}

function addPeso() {
  const p = parseFloat(document.getElementById('peso-input')?.value);
  if (p) {
    bodyData.push({fecha: new Date().toISOString().split('T')[0], peso: p});
    saveToFirebase();
    alert('Peso guardado');
    gT('Cuerpo');
  }
}
